openapi: 3.0.3
info:
  title: go.server API
  version: 0.1.0
  description: API definition for go.server (spec-first).

servers:
  - url: http://localhost:8080

tags:
  - name: users

# API パスは openapi/paths 配下の path item ファイルを $ref で参照する。
paths:
  /users/{id}:
    $ref: "./paths/user.yaml"
  /users:
    $ref: "./paths/users.yaml"

# 共有スキーマ / レスポンスは openapi/schemas 配下のファイルを登録する。
# (redocly bundle がこの名前で components へ集約する。)
components:
  schemas:
    User:
      $ref: "./schemas/User.yaml"
    CreateUserRequest:
      $ref: "./schemas/CreateUserRequest.yaml"
    Error:
      $ref: "./schemas/Error.yaml"
  responses:
    BadRequest:
      $ref: "./schemas/responses/BadRequest.yaml"
    NotFound:
      $ref: "./schemas/responses/NotFound.yaml"
    Error:
      $ref: "./schemas/responses/Error.yaml"
